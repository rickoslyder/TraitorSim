services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ../data/reports:/app/reports  # Game engine saves reports here
      - ../data/sessions:/app/traitorsim/data/sessions
      - ../:/app/traitorsim  # Mount TraitorSim project for game runner (writable for data/)
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app/traitorsim:/app
      - REPORTS_DIR=/app/reports
      - SESSIONS_DIR=/app/traitorsim/data/sessions
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:-}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - default

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    ports:
      - "8085:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - default
      - traefik_proxy
    # Prod: /srv/dockerdata/traitorsim. Dev :8085 only — no Traefik (duplicate Host broke routing).
    labels:
      - "traefik.enable=false"

networks:
  default:
  traefik_proxy:
    external: true
